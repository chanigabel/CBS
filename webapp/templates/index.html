<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel standardization</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/static/style.css?v={{ v_css }}">
</head>
<body>
    <!-- Error Banner -->
    <div id="error-banner" class="error-banner hidden" role="alert">
        <span id="error-message"></span>
        <button class="dismiss-btn" onclick="dismissError()" aria-label="Dismiss error">✕</button>
    </div>

    <div class="container">
        <header>
            <h1>Excel standardization</h1>
            <p class="subtitle">Upload, normalize, edit, and export Excel workbooks</p>
        </header>

        <!-- Upload Section -->
        <section id="upload-section" class="card">
            <h2>Upload Excel Files</h2>
            <form id="upload-form">
                <div class="file-input-wrapper">
                    <input
                        type="file"
                        id="file-input"
                        accept=".xlsx,.xlsm"
                        multiple
                        required
                        aria-label="Select Excel files"
                    >
                    <label for="file-input" class="file-label">
                        Choose .xlsx or .xlsm files (multiple allowed)
                    </label>
                </div>
                <button type="submit" id="upload-btn" class="btn btn-primary">
                    Upload
                </button>
            </form>
            <div id="upload-status" class="status-message"></div>
        </section>

        <!-- Session Switcher — always shown once any file is loaded -->
        <section id="session-switcher" class="card hidden">
            <h2>Open Files</h2>
            <div id="session-tabs" class="sheet-tabs" role="tablist"></div>
        </section>

        <!-- Sheet Selector -->
        <section id="sheet-selector" class="card hidden">
            <h2>Select Sheet</h2>
            <div id="sheet-tabs" class="sheet-tabs" role="tablist"></div>
        </section>

        <!-- Action Bar -->
        <div id="action-bar" class="action-bar hidden">
            <!-- Institution bar: workbook-level MosadID / MosadType / MosadName -->
            <div id="institution-bar" class="institution-bar">
                <span class="institution-label">מוסד:</span>
                <input id="inst-id"   class="inst-input" type="text" placeholder="MosadID"   title="מספר מוסד" />
                <span class="institution-label inst-type-label">סוג מוסד:</span>
                <input id="inst-type-1" class="inst-input inst-type-input" type="text" placeholder="סוג 1" title="ערך סוג מוסד 1 (ברירת מחדל)" />
                <input id="inst-type-2" class="inst-input inst-type-input" type="text" placeholder="סוג 2" title="ערך סוג מוסד 2" />
                <input id="inst-type-3" class="inst-input inst-type-input" type="text" placeholder="סוג 3" title="ערך סוג מוסד 3" />
                <select id="inst-type-apply-select" class="inst-select inst-type-apply-select" title="בחר ערך להחלה">
                </select>
                <button class="btn btn-sm btn-outline" onclick="applyMosadType()" title="החל את ערך הסוג הנבחר על כל השורות">החל סוג</button>
                <input id="inst-name" class="inst-input inst-name" type="text" placeholder="שם מוסד (לשם הקובץ)" title="שם מוסד" />
            </div>
            <div class="action-buttons">
            <button id="normalize-btn" class="btn btn-success" onclick="runstandardization()">
                ▶ Run standardization
                <kbd class="kbd-hint">Ctrl+↵</kbd>
            </button>
            <button id="delete-rows-btn" class="btn btn-danger" onclick="deleteSelectedRows()" disabled>
                🗑 Delete rows
            </button>
            <button id="clear-all-filters-btn" class="btn btn-filter-clear hidden" onclick="clearAllFilters()">
                ✕ נקה כל הסינונים
            </button>
            <button id="export-btn" class="btn btn-secondary" onclick="exportWorkbook()">
                ⬇ Export / Download
                <kbd class="kbd-hint">Ctrl+S</kbd>
            </button>
            </div>
        </div>

        <!-- Grid Section -->
        <section id="grid-section" class="card hidden">
            <div class="grid-section-header">
                <h2 id="grid-title"></h2>
                <button id="expand-grid-btn" class="btn-expand-grid" onclick="openGridOverlay()" title="הגדל טבלה למסך מלא">⛶ הגדל טבלה</button>
            </div>
            <div id="grid-stats" class="grid-stats"></div>
            <div id="grid-container" class="grid-container"></div>
        </section>
    </div>

    <!-- Full-screen grid overlay -->
    <div id="grid-overlay" class="grid-overlay hidden" role="dialog" aria-modal="true" aria-label="טבלה במסך מלא">
        <div class="grid-overlay-bar">
            <span id="grid-overlay-title" class="grid-overlay-title"></span>
            <span id="grid-overlay-stats" class="grid-overlay-stats"></span>
            <button class="btn-overlay-close" onclick="closeGridOverlay()" title="סגור מסך מלא (Esc)">✕ סגור</button>
        </div>
        <div id="grid-overlay-container" class="grid-overlay-container"></div>
    </div>

    <script src="/static/app.js?v={{ v_js }}"></script>
</body>
</html>
